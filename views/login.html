<!DOCTYPE html>
<html lang="fr-FR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BatCave - Connexion</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">BatCave</a>
        <div class="collapse navbar-collapse show" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="/">Accueil</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="/auth/login"
                >Se connecter</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/register.html">S'inscrire</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container mt-5">
      <h1>Connexion</h1>

      <form id="login-form" class="mt-3" style="max-width: 400px">
        <div class="mb-3">
          <label for="username" class="form-label">Nom d'utilisateur</label>
          <input
            type="text"
            class="form-control"
            id="username"
            name="username"
            placeholder="Nom d'utilisateur"
            required
            autocomplete="username"
          />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Mot de passe</label>
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            placeholder="Mot de passe"
            required
            autocomplete="current-password"
          />
        </div>
        <button type="submit" class="btn btn-primary">Se connecter</button>
        <p id="login-message" class="mt-3"></p>

        <hr class="my-4" />
        <p class="text-muted mb-2">Ou se connecter avec</p>
        <div class="d-grid gap-2">
          <a href="/auth/google" class="btn btn-outline-danger">Google</a>
          <a href="/auth/github" class="btn btn-outline-dark">GitHub</a>
          <a href="/auth/discord" class="btn btn-outline-primary">Discord</a>
        </div>

        <p class="mt-3">
          <a href="/register.html">Pas encore de compte ? S'inscrire</a>
        </p>
      </form>

      <form id="totp-form" class="mt-3 d-none" style="max-width: 400px">
        <p class="text-muted" id="totp-hint"></p>
        <div class="mb-3">
          <label for="totp-code" class="form-label">Code TOTP (6 chiffres)</label>
          <input
            type="text"
            class="form-control"
            id="totp-code"
            name="code"
            inputmode="numeric"
            pattern="[0-9]{6}"
            maxlength="6"
            placeholder="000000"
            required
            autocomplete="one-time-code"
          />
        </div>
        <button type="submit" class="btn btn-primary">Valider le code</button>
        <button type="button" id="totp-back" class="btn btn-link">Retour</button>
        <p id="totp-message" class="mt-3"></p>
      </form>
    </main>

    <script src="/login.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
