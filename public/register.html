<!DOCTYPE html>
<html lang="fr-FR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BatCave - Inscription</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">BatCave</a>
        <div class="collapse navbar-collapse show" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="/">Accueil</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/auth/login">Se connecter</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="/register.html"
                >S'inscrire</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container mt-5">
      <h1>Inscription</h1>
      <form id="register-form" class="mt-3" style="max-width: 400px">
        <div class="mb-3">
          <label for="username" class="form-label">Nom d'utilisateur</label>
          <input
            type="text"
            class="form-control"
            id="username"
            placeholder="Nom d'utilisateur"
            required
          />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Mot de passe</label>
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Mot de passe"
            required
          />
          <div class="form-text">
            Minimum 8 caractères (validation côté serveur).
          </div>
        </div>
        <button type="submit" class="btn btn-primary">S'inscrire</button>
        <p id="message" class="mt-3"></p>
        <p class="mt-3">
          <a href="/auth/login">Déjà un compte ? Se connecter</a>
        </p>
      </form>
    </main>

    <script src="/register.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
